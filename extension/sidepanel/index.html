<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tab Helper</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="header">
      <div class="header-top">
        <h1 class="logo">
          <span class="logo-icon">⚡</span>
          Tab Helper
        </h1>
        <div class="header-right">
          <div class="tab-budget" id="tabBudget" title="标签预算">
            <span id="tabCount">0</span>/<span id="tabBudgetMax">100</span>
            <div class="budget-bar"><div class="budget-fill" id="budgetFill"></div></div>
          </div>
          <button class="icon-btn" id="btnSettings" title="设置">⚙️</button>
        </div>
      </div>

      <div class="header-actions">
        <button id="btnScan" class="btn btn-primary">
          <span class="btn-icon">🔍</span> 扫描
        </button>
        <button id="btnCategorize" class="btn btn-accent" disabled>
          <span class="btn-icon">🤖</span> AI 分类
        </button>
        <button id="btnWizard" class="btn btn-ghost" disabled>
          <span class="btn-icon">🧹</span> 引导清理
        </button>
        <button id="btnDuplicates" class="btn btn-ghost" disabled>
          <span class="btn-icon">🔗</span> 去重
        </button>
      </div>

      <div class="header-sub-actions">
        <button id="btnExport" class="btn btn-sm btn-ghost" disabled>
          <span class="btn-icon">📤</span> 导出
        </button>
        <button id="btnAnalysis" class="btn btn-sm btn-ghost" disabled>
          <span class="btn-icon">🧬</span> 画像
        </button>
        <button id="btnSaveSession" class="btn btn-sm btn-ghost" disabled>
          <span class="btn-icon">💾</span> 会话
        </button>
        <button id="btnViewSessions" class="btn btn-sm btn-ghost">
          <span class="btn-icon">📂</span> 历史
        </button>
        <button id="btnViewSnapshots" class="btn btn-sm btn-ghost">
          <span class="btn-icon">📸</span> 快照
        </button>
        <button id="btnBookmarks" class="btn btn-sm btn-ghost">
          <span class="btn-icon">🔖</span> 收藏夹
        </button>
        <button id="btnGraph" class="btn btn-sm btn-ghost" disabled>
          <span class="btn-icon">🕸️</span> 图谱
        </button>
        <button id="btnResearch" class="btn btn-sm btn-ghost" disabled>
          <span class="btn-icon">🔬</span> 研究
        </button>
        <button id="btnWeekly" class="btn btn-sm btn-ghost" disabled>
          <span class="btn-icon">📊</span> 周报
        </button>
        <button id="btnApiLogs" class="btn btn-sm btn-ghost">
          <span class="btn-icon">📊</span> 日志
        </button>
      </div>

      <!-- Model Selector -->
      <div class="model-selector" id="modelSelector" style="display:none">
        <span>模型:</span>
        <select id="modelSelect" class="model-select"></select>
      </div>

      <!-- Progress -->
      <div class="progress-bar-container" id="progressContainer">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText"></div>
      <div class="classify-log" id="classifyLog" style="display:none"></div>

      <div id="backendStatus" class="status-bar status-disconnected">
        <span class="status-dot"></span>
        <span class="status-text">后端未连接</span>
      </div>
    </header>

    <!-- Filter Bar -->
    <div class="filter-bar" id="filterBar" style="display:none">
      <div class="filter-row">
        <select id="filterCategory" class="filter-select">
          <option value="all">所有分类</option>
        </select>
        <select id="filterSort" class="filter-select">
          <option value="category">按分类</option>
          <option value="priority">按优先级</option>
          <option value="domain">按域名</option>
          <option value="age">按时间</option>
          <option value="title">按标题</option>
        </select>
      </div>
      <div class="filter-row facet-chips" id="facetChips">
        <button class="facet-chip" data-facet="new"><span class="facet-chip-icon">🆕</span>未处理 <span class="facet-chip-count" id="fc-new"></span></button>
        <button class="facet-chip" data-facet="duplicate"><span class="facet-chip-icon">🔴</span>重复 <span class="facet-chip-count" id="fc-duplicate"></span></button>
        <button class="facet-chip" data-facet="outdated"><span class="facet-chip-icon">📅</span>过时 <span class="facet-chip-count" id="fc-outdated"></span></button>
        <button class="facet-chip" data-facet="frozen"><span class="facet-chip-icon">❄️</span>冻结 <span class="facet-chip-count" id="fc-frozen"></span></button>
        <button class="facet-chip" data-facet="snoozed"><span class="facet-chip-icon">⏰</span>稍后读 <span class="facet-chip-count" id="fc-snoozed"></span></button>
      </div>
      <div class="filter-row">
        <div class="search-wrapper">
          <input type="text" id="filterSearch" class="filter-input" placeholder="搜索标签...">
          <button id="btnSearchClear" class="search-clear" title="清空搜索" style="display:none">&times;</button>
        </div>
        <button id="btnLocateCurrent" class="btn btn-sm btn-accent">定位当前</button>
        <button id="btnSelectAll" class="btn btn-sm btn-ghost">全选</button>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="state-panel" style="display:none">
      <div class="spinner"></div>
      <p id="loadingText">正在扫描标签...</p>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="state-panel">
      <div class="empty-icon">🗂️</div>
      <h2>开始整理你的标签</h2>
      <p>点击「扫描」获取所有打开的标签页</p>
    </div>

    <!-- Tab List -->
    <div id="tabList" class="tab-list" style="display:none"></div>
    <!-- Batch Actions -->
    <div id="batchActions" class="batch-bar" style="display:none">
      <span id="selectedCount">0 已选</span>
      <div class="batch-buttons">
        <button id="btnBatchClose" class="btn btn-sm btn-danger">关闭</button>
        <button id="btnBatchSnooze" class="btn btn-sm btn-ghost">稍后读</button>
        <button id="btnBatchBookmark" class="btn btn-sm btn-ghost">收藏</button>
        <button id="btnBatchSummarize" class="btn btn-sm btn-accent">总结</button>
        <button id="btnBatchCategorize" class="btn btn-sm btn-primary">AI分类</button>
      </div>
    </div>

    <!-- Snooze Modal -->
    <div id="snoozeModal" class="modal" style="display:none">
      <div class="modal-content modal-sm">
        <div class="modal-header">
          <h3>⏰ 稍后阅读</h3>
          <button class="modal-close" data-close="snoozeModal">&times;</button>
        </div>
        <div class="modal-body">
          <p class="snooze-hint" id="snoozeHint">选择提醒时间</p>
          <div class="snooze-grid">
            <button class="snooze-option" data-minutes="1">1 分钟后</button>
            <button class="snooze-option" data-minutes="30">30 分钟后</button>
            <button class="snooze-option" data-minutes="180">3 小时后</button>
            <button class="snooze-option" data-minutes="480">今晚</button>
            <button class="snooze-option" data-minutes="1440">明天</button>
            <button class="snooze-option" data-minutes="4320">3 天后</button>
            <button class="snooze-option" data-minutes="10080">下周</button>
            <button class="snooze-option" data-minutes="43200">下月</button>
          </div>
          <div class="snooze-custom">
            <input type="datetime-local" id="snoozeCustomTime" class="filter-input">
            <button id="btnSnoozeCustom" class="btn btn-sm btn-primary">设定</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Export Modal -->
    <div id="exportModal" class="modal" style="display:none">
      <div class="modal-content">
        <div class="modal-header">
          <h3>📤 导出标签</h3>
          <button class="modal-close" data-close="exportModal">&times;</button>
        </div>
        <div class="modal-body">
          <button class="export-option" data-format="json">
            <span class="export-icon">📋</span>
            <div><span class="export-label">JSON</span><span class="export-desc">结构化数据，适合程序处理</span></div>
          </button>
          <button class="export-option" data-format="markdown">
            <span class="export-icon">📝</span>
            <div><span class="export-label">Markdown</span><span class="export-desc">可读性报告，适合分享</span></div>
          </button>
          <button class="export-option" data-format="notes">
            <span class="export-icon">🍎</span>
            <div><span class="export-label">笔记卡片</span><span class="export-desc">Apple Notes 兼容格式</span></div>
          </button>
        </div>
        <div id="exportResult" class="export-result" style="display:none">
          <textarea id="exportContent" class="export-textarea" readonly></textarea>
          <button id="btnCopyExport" class="btn btn-primary btn-full">复制到剪贴板</button>
        </div>
      </div>
    </div>

    <!-- Summary Modal -->
    <div id="summaryModal" class="modal" style="display:none">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3 id="summaryTitle">摘要</h3>
          <button class="modal-close" data-close="summaryModal">&times;</button>
        </div>
        <div id="summaryBody" class="modal-body summary-body"></div>
      </div>
    </div>

    <!-- Sessions Modal -->
    <div id="sessionsModal" class="modal" style="display:none">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3>📂 历史会话</h3>
          <button class="modal-close" data-close="sessionsModal">&times;</button>
        </div>
        <div id="sessionsBody" class="modal-body"></div>
      </div>
    </div>

    <!-- Duplicates Modal -->
    <div id="duplicatesModal" class="modal" style="display:none">
      <div class="modal-content">
        <div class="modal-header">
          <h3>🔗 重复/相似标签</h3>
          <button class="modal-close" data-close="duplicatesModal">&times;</button>
        </div>
        <div id="duplicatesBody" class="modal-body"></div>
      </div>
    </div>

    <!-- Snapshots Modal -->
    <div id="snapshotsModal" class="modal" style="display:none">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3>📸 页面快照</h3>
          <button class="modal-close" data-close="snapshotsModal">&times;</button>
        </div>
        <div id="snapshotsBody" class="modal-body"></div>
      </div>
    </div>

    <!-- Analysis Modal -->
    <div id="analysisModal" class="modal" style="display:none">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3>🧬 深度分析 · 人物画像</h3>
          <button class="modal-close" data-close="analysisModal">&times;</button>
        </div>
        <div id="analysisBody" class="modal-body analysis-body"></div>
      </div>
    </div>

    <!-- Bookmark Manager Modal -->
    <div id="bookmarkModal" class="modal" style="display:none">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3>🔖 收藏夹管理</h3>
          <button class="modal-close" data-close="bookmarkModal">&times;</button>
        </div>
        <div id="bookmarkBody" class="modal-body"></div>
      </div>
    </div>

    <!-- Bookmark Folder Picker Modal -->
    <div id="folderPickerModal" class="modal" style="display:none">
      <div class="modal-content modal-sm">
        <div class="modal-header">
          <h3>选择收藏夹</h3>
          <button class="modal-close" data-close="folderPickerModal">&times;</button>
        </div>
        <div class="modal-body">
          <div id="folderPickerList" class="folder-picker"></div>
          <div style="display:flex;gap:6px;margin-bottom:10px">
            <input type="text" id="newFolderName" class="filter-input" placeholder="新建文件夹名...">
            <button id="btnCreateFolder" class="btn btn-sm btn-primary">创建</button>
          </div>
          <button id="btnConfirmFolder" class="btn btn-primary btn-full">确认收藏到此文件夹</button>
        </div>
      </div>
    </div>

    <!-- API Logs Modal -->
    <div id="apiLogsModal" class="modal" style="display:none">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3>📊 API 调用日志</h3>
          <button class="modal-close" data-close="apiLogsModal">&times;</button>
        </div>
        <div id="apiLogsBody" class="modal-body"></div>
      </div>
    </div>

    <!-- Graph Modal -->
    <div id="graphModal" class="modal" style="display:none">
      <div class="modal-content modal-lg" style="max-height:92vh">
        <div class="modal-header" style="padding:12px 16px">
          <h3 style="font-size:15px">🕸️ 标签关系图谱</h3>
          <div style="display:flex;align-items:center;gap:6px">
            <select id="graphLinkFilter" style="font-size:11px;padding:2px 6px;border-radius:6px;border:1px solid var(--c-border);background:var(--c-bg2);color:var(--c-text)">
              <option value="all">全部关系</option>
              <option value="same_domain">同域名</option>
              <option value="same_topic">同分类</option>
              <option value="duplicate">重复</option>
            </select>
            <button class="modal-close" data-close="graphModal">&times;</button>
          </div>
        </div>
        <div id="graphBody" class="modal-body" style="padding:0;height:min(70vh,560px);position:relative;overflow:hidden;background:var(--c-bg)"></div>
      </div>
    </div>

    <!-- Research Sessions Modal -->
    <div id="researchModal" class="modal" style="display:none">
      <div class="modal-content modal-lg">
        <div class="modal-header">
          <h3>🔬 研究会话</h3>
          <button class="modal-close" data-close="researchModal">&times;</button>
        </div>
        <div id="researchBody" class="modal-body"></div>
      </div>
    </div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="modal" style="display:none">
      <div class="modal-content">
        <div class="modal-header">
          <h3>⚙️ 设置</h3>
          <button class="modal-close" data-close="settingsModal">&times;</button>
        </div>
        <div class="modal-body">
          <div class="setting-group">
            <label class="setting-label">主题模式</label>
            <select id="settingTheme" class="filter-select">
              <option value="auto">跟随系统</option>
              <option value="light">浅色</option>
              <option value="dark">深色</option>
            </select>
          </div>
          <div class="setting-group">
            <label class="setting-label">标签预算上限</label>
            <input type="number" id="settingBudget" class="filter-input" value="100" min="10" max="500">
            <span class="setting-hint">超出时显示警告</span>
          </div>
          <div class="setting-group">
            <label class="setting-label">后端地址</label>
            <input type="text" id="settingBackendUrl" class="filter-input" value="http://127.0.0.1:3456">
          </div>
          <button id="btnSaveSettings" class="btn btn-primary btn-full" style="margin-top:12px">保存设置</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js" type="module"></script>
</body>
</html>
