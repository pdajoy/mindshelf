name: Build & Package

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-extension:
    name: Chrome Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: extension/package-lock.json

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        working-directory: extension
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build extension
        run: npm run build
        working-directory: extension

      - name: Package zip
        run: npm run zip
        working-directory: extension

      - name: Upload extension artifact
        uses: actions/upload-artifact@v5
        with:
          name: mindshelf-chrome-extension
          path: extension/dist/*.zip
          if-no-files-found: error

  build-backend:
    name: Backend TypeScript Build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Set version from tag
        working-directory: backend
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install & compile
        working-directory: backend
        run: npm ci && npm run build

  release:
    name: Create Release
    needs: [build-extension, build-backend]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: RELEASE_NOTES.md
          sparse-checkout-cone-mode: false

      - uses: actions/download-artifact@v5
        with:
          name: mindshelf-chrome-extension
          path: artifacts/

      - name: Build release body
        id: notes
        run: |
          if [ -f RELEASE_NOTES.md ]; then
            cat RELEASE_NOTES.md > /tmp/body.md
          else
            echo "See commit history for changes." > /tmp/body.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/body.md
          generate_release_notes: true
          append_body: true
          files: artifacts/*.zip
